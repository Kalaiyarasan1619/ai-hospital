spring.application.name=patient
dotenv.enabled=true
# Database Configuration
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?sslmode=require
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver



# JPA Configuration
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Connection Pool Configuration
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000

# JWT Configuration - IMPORTANT: These names must match your JwtUtils class
app.jwtSecret=${JWT_SECRET:dev-jwt-secret-change-me}
app.jwtExpirationMs=${JWT_EXPIRATION:86400000}
app.aiInternalKey=${AI_INTERNAL_KEY:}

# Stripe Configuration
stripe.secret.key=${STRIPE_SECRET_KEY:sk_test_dummy}
stripe.publishable.key=${STRIPE_PUBLISHABLE_KEY:pk_test_dummy}
stripe.api.version=${STRIPE_API_VERSION:2024-06-20}

# Server Configuration
server.address=0.0.0.0
server.port=8082


# Tomcat Configuration
server.tomcat.max-threads=50

# JPA Batch Configuration
spring.jpa.properties.hibernate.jdbc.batch_size=5

# Logging Configuration
logging.level.com.food=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN


# eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:https://ai-hospital-eureka.onrender.com/eureka/}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true